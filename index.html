<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Álbum Copa 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- Header Fixo -->
    <div class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm p-4 z-20 border-b">
        <h1 class="text-center font-black text-slate-800 tracking-tight">COPA 2026 TRACKER</h1>
        
        <div class="max-w-md mx-auto mt-3">
            <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1 px-1">
                <span id="contador-texto">0 / 980</span>
                <span id="porcentagem">0%</span>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                <div id="barra-progresso" class="bg-green-500 h-full transition-all duration-500 w-0"></div>
            </div>
        </div>

        <!-- Atalhos de Navegação Rápida -->
        <div class="flex gap-2 mt-4 overflow-x-auto no-scrollbar pb-1 text-xs">
            <button onclick="scrollPara(1)" class="bg-slate-800 text-white px-3 py-1 rounded-full shrink-0">1-100</button>
            <button onclick="scrollPara(200)" class="bg-slate-800 text-white px-3 py-1 rounded-full shrink-0">200-300</button>
            <button onclick="scrollPara(400)" class="bg-slate-800 text-white px-3 py-1 rounded-full shrink-0">400-500</button>
            <button onclick="scrollPara(600)" class="bg-slate-800 text-white px-3 py-1 rounded-full shrink-0">600-700</button>
            <button onclick="scrollPara(800)" class="bg-slate-800 text-white px-3 py-1 rounded-full shrink-0">800-980</button>
        </div>
    </div>

    <!-- Lista de Figurinhas -->
    <main class="p-4 max-w-2xl mx-auto">
        <div id="grid-container" class="sticker-grid">
            <!-- Gerado via JS -->
        </div>
    </main>

    <script>
        const TOTAL = 980;
        let obtidas = new Set(JSON.parse(localStorage.getItem('album2026_data')) || []);

        const grid = document.getElementById('grid-container');
        const barra = document.getElementById('barra-progresso');
        const contadorTexto = document.getElementById('contador-texto');
        const porcentagemTexto = document.getElementById('porcentagem');

        function salvar() {
            localStorage.setItem('album2026_data', JSON.stringify([...obtidas]));
            const progresso = (obtidas.size / TOTAL) * 100;
            barra.style.width = progresso + '%';
            contadorTexto.innerText = `${obtidas.size} / ${TOTAL}`;
            porcentagemTexto.innerText = Math.round(progresso) + '%';
        }

        function toggle(n, el) {
            if (obtidas.has(n)) {
                obtidas.delete(n);
                el.classList.replace('bg-green-500', 'bg-white');
                el.classList.replace('text-white', 'text-slate-400');
                el.classList.replace('border-green-600', 'border-slate-200');
            } else {
                obtidas.add(n);
                el.classList.replace('bg-white', 'bg-green-500');
                el.classList.replace('text-slate-400', 'text-white');
                el.classList.replace('border-slate-200', 'border-green-600');
            }
            salvar();
        }

        function scrollPara(num) {
            const el = document.getElementById(`card-${num}`);
            if (el) {
                const offset = 160; // Compensar o header fixo
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = el.getBoundingClientRect().top;
                const elementPosition = elementRect - bodyRect;
                const offsetPosition = elementPosition - offset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });
            }
        }

        // Criar os cards de forma eficiente
        const fragment = document.createDocumentFragment();
        for (let i = 1; i <= TOTAL; i++) {
            const div = document.createElement('div');
            div.id = `card-${i}`;
            const check = obtidas.has(i);
            
            div.className = `h-14 flex flex-col items-center justify-center rounded-lg border-2 font-bold transition-all active:scale-90 cursor-pointer 
                ${check ? 'bg-green-500 text-white border-green-600' : 'bg-white text-slate-400 border-slate-200'}`;
            
            div.innerHTML = `<span class="text-[8px] uppercase opacity-50">Nº</span><span>${i}</span>`;
            div.onclick = () => toggle(i, div);
            fragment.appendChild(div);
        }
        grid.appendChild(fragment);

        // Inicializar progresso
        salvar();
    </script>
</body>
</html>
